<!DOCTYPE html>
<html>

<head>
    <title>Screenshot Editor</title>
    <style>
        :root {
            /* Light Theme (Default) */
            --bg-app: #f0f2f5;
            --bg-container: #ffffff;
            --text-main: #333333;
            --text-secondary: #666666;
            --border: #dddddd;
            --bg-toolbar: #ffffff;
            --bg-hover: #f3f3f3;
            --shadow: rgba(0, 0, 0, 0.1);

            --primary: #0078d4;
            --primary-hover: #106ebe;
        }

        [data-theme="dark"] {
            /* Dark Theme */
            --bg-app: #121212;
            --bg-container: #242526;
            --text-main: #e4e6eb;
            --text-secondary: #b0b3b8;
            --border: #3e4042;
            --bg-toolbar: #18191a;
            --bg-hover: #2d2e30;
            --shadow: rgba(0, 0, 0, 0.3);

            --primary: #2e89ff;
            --primary-hover: #1877f2;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            background: var(--bg-app);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--bg-container);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 12px var(--shadow);
            max-width: 95%;
            width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        h2 {
            margin: 0;
            color: var(--text-main);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .preview-container {
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
            background: var(--bg-app);
            /* Use app bg for canvas backdrop */
            display: flex;
            justify-content: center;
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
            background: var(--bg-app);
            color: var(--text-main);
        }

        .actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            border-top: 1px solid var(--border);
            padding-top: 15px;
        }

        button {
            padding: 8px 16px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: background 0.2s;
        }

        .btn-cancel {
            background: var(--bg-hover);
            color: var(--text-main);
        }

        .btn-cancel:hover {
            opacity: 0.8;
        }

        .btn-download {
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-download:hover {
            background: var(--primary-hover);
        }

        .tool-btn {
            padding: 6px;
            background: var(--bg-toolbar) !important;
            border: 1px solid var(--border) !important;
            border-radius: 4px;
            cursor: pointer;
        }

        .tool-btn svg {
            stroke: var(--text-secondary);
            /* Default stroke */
        }

        /* Specific overrides for color tools if needed, or let them keep their colors */
        #tool-highlight svg {
            stroke: #FFD700;
        }

        #tool-pen svg {
            stroke: #ff0000;
        }

        #tool-text svg {
            stroke: var(--text-main);
        }

        #tool-clear svg {
            stroke: var(--text-secondary);
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>
            Screenshot Editor
            <span style="font-size:12px; font-weight:normal; color:#666;" id="timestamp"></span>
        </h2>

        <div class="toolbar"
            style="display:flex; gap:10px; padding-bottom:10px; justify-content:center; align-items:center;">
            <button id="tool-highlight" class="tool-btn" title="Highlighter"
                style="padding:6px; background:white; border:1px solid #ccc; border-radius:4px; cursor:pointer;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FFD700" stroke-width="2">
                    <path d="M9 11l-6 6v3h9l-3-3" />
                    <path d="M22 12l-4.6 4.6a2 2 0 0 1-2.8 0l-5.2-5.2a2 2 0 0 1 0-2.8L14 4" />
                </svg>
            </button>
            <button id="tool-pen" class="tool-btn" title="Pen"
                style="padding:6px; background:white; border:1px solid #ccc; border-radius:4px; cursor:pointer;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ff0000" stroke-width="2">
                    <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z" />
                </svg>
            </button>
            <button id="tool-text" class="tool-btn" title="Add Text"
                style="padding:6px; background:white; border:1px solid #ccc; border-radius:4px; cursor:pointer;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2">
                    <path d="M4 7V4h16v3" />
                    <path d="M9 20h6" />
                    <path d="M12 4v16" />
                </svg>
            </button>
            <div style="width:1px; background:#ddd; height:24px; margin:0 5px;"></div>
            <button id="tool-clear" class="tool-btn" title="Clear All"
                style="padding:6px; background:#f0f0f0; border:1px solid #ccc; border-radius:4px; cursor:pointer;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2">
                    <polyline points="3 6 5 6 21 6" />
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                </svg>
            </button>
        </div>
        <div class="preview-container" style="position:relative; overflow:auto; max-height:85vh; text-align:center;">
            <canvas id="editorCanvas" style="max-width:100%; height:auto; display:inline-block;"></canvas>
        </div>

        <div style="display:flex; flex-direction:column; gap:5px;">
            <label style="font-weight:600; font-size:13px;">Add Comment / Annotation Note:</label>
            <textarea id="commentBox" placeholder="Describe what is shown in this screenshot..."></textarea>
        </div>

        <div class="actions">
            <button class="btn-cancel" id="cancelBtn">Close</button>
            <button class="btn-download" id="jiraBtn" style="background: #0052cc; display:none; margin-right:10px;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                    <circle cx="8" cy="8" r="2" fill="currentColor" stroke="none" />
                    <path d="M16 16l-4-4" />
                </svg>
                Create JIRA Ticket
            </button>
            <button class="btn-download" id="downloadBtn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                Download Image
            </button>
        </div>
    </div>

    <script src="screenshot-editor.js"></script>
    <script src="jira-helper.js"></script>
</body>

</html>
