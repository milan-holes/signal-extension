<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Signal</title>
  <style>
    :root {
      /* Shared Palette */
      --primary: #2e89ff;
      /* Signal Blue */
      --primary-hover: #1877f2;
      --danger: #fa383e;
      --success: #31a24c;

      /* Light Theme (Default) */
      --bg-main: #ffffff;
      --bg-card: #f8fafc;
      --bg-hover: #f1f5f9;
      --text-main: #0f172a;
      --text-secondary: #64748b;
      --border: #e2e8f0;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);

      --font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    [data-theme="dark"] {
      --bg-main: #121212;
      --bg-card: #18191a;
      --bg-hover: #2d2e30;
      --text-main: #e4e6eb;
      --text-secondary: #b0b3b8;
      --border: #3e4042;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
    }

    body {
      width: 320px;
      /* Reduced width */
      margin: 0;
      padding: 0;
      font-family: var(--font-family);
      background-color: var(--bg-main);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      min-height: auto;
    }

    /* Header */
    .header {
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 16px;
      color: var(--text-main);
    }

    .logo svg {
      color: var(--primary);
    }

    .header-icons {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-btn:hover {
      background: var(--bg-hover);
      color: var(--primary);
      transform: translateY(-1px);
    }

    /* Main Container */
    .main-container {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Section Labels */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Recording Section */
    .recording-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .action-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: var(--primary);
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 2px 4px rgba(59, 130, 246, 0.2);
    }

    .action-btn:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 8px rgba(59, 130, 246, 0.3);
    }

    .action-btn:active {
      transform: translateY(0);
    }

    /* Screenshot Grid */
    .screenshot-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .tool-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .tool-card:hover {
      border-color: var(--primary);
      background: var(--bg-hover);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .tool-card svg {
      color: var(--text-secondary);
      transition: color 0.2s;
    }

    .tool-card:hover svg {
      color: var(--primary);
    }

    .tool-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-main);
    }

    .full-width {
      grid-column: span 2;
    }

    /* Footer */
    .footer {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      background: var(--bg-card);
    }

    /* Active Recording State */
    .recording-overlay {
      /* position: absolute; removed to prevent body collapse */
      background: var(--bg-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      flex: 1;
      min-height: 140px;
    }

    .recording-pulse {
      width: 10px;
      height: 10px;
      background-color: var(--danger);
      border-radius: 50%;
      margin-bottom: 8px;
      box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
      animation: pulse-red 2s infinite;
    }

    @keyframes pulse-red {
      0% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
      }

      70% {
        transform: scale(1);
        box-shadow: 0 0 0 8px rgba(239, 68, 68, 0);
      }

      100% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
      }
    }

    .timer {
      font-size: 24px;
      font-weight: 700;
      font-family: monospace;
      color: var(--text-main);
      margin-bottom: 20px;
    }

    .controls-row {
      display: flex;
      gap: 12px;
      width: 100%;
    }

    /* Helper Utilities */
    .hidden {
      display: none !important;
    }

    .btn-secondary {
      background: var(--bg-card);
      color: var(--text-main);
      border: 1px solid var(--border);
      box-shadow: none;
    }

    .btn-secondary:hover {
      background: var(--bg-hover);
      border-color: var(--text-secondary);
      box-shadow: none;
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-danger:hover {
      background: #dc2626;
      box-shadow: 0 4px 8px rgba(239, 68, 68, 0.3);
    }

    /* Toggle Switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 32px;
      height: 18px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: var(--border);
      transition: .3s;
      border-radius: 20px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 2px;
      bottom: 2px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }

    input:checked+.slider {
      background-color: var(--primary);
    }

    input:checked+.slider:before {
      transform: translateX(14px);
    }

    /* Settings Overlay */
    .settings-view {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg-main);
      z-index: 100;
      display: flex;
      flex-direction: column;
    }

    .settings-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .settings-body {
      padding: 16px;
      flex: 1;
      overflow-y: auto;
    }

    .setting-item {
      margin-bottom: 16px;
    }

    .setting-label {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 6px;
      display: block;
    }

    input[type="text"],
    input[type="number"],
    input[type="password"],
    select,
    textarea {
      width: 100%;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-main);
      font-size: 13px;
      box-sizing: border-box;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: var(--primary);
    }

    /* Current Tab Indicator in Recording */
    .tab-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--primary);
      background: rgba(59, 130, 246, 0.1);
      /* Primary tint */
      padding: 2px 8px;
      border-radius: 12px;
      margin-left: auto;
    }

    /* Fix for injected icons */
    .icon-sm {
      width: 16px;
      height: 16px;
    }

    /* Compact Recording Buttons */
    .recording-overlay .action-btn {
      padding: 8px 16px;
      font-size: 13px;
      height: auto;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <div class="logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M14 8 L23 4 V13 Z" fill="currentColor" fill-opacity="0.4" />
        <path d="M8 21 L10 10 H14 L16 21 H8 Z" fill="currentColor" />
        <path d="M12 2 L9 6 H15 L12 2 Z" fill="currentColor" />
        <rect x="10" y="6" width="4" height="4" fill="currentColor" />
      </svg>
      Signal
    </div>
    <div class="header-icons">
      <button class="icon-btn" id="themeToggle" title="Toggle Theme">
        <!-- SVG injected by JS -->
      </button>
      <button class="icon-btn" id="settingsBtn" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"></circle>
          <path
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
        </svg>
      </button>
    </div>
  </header>

  <!-- MAIN LAYOUT -->
  <main id="mainView" class="main-container">

    <!-- RECORDING -->
    <div class="recording-section">
      <div class="section-label">
        Screen Recording
        <span class="tab-badge" id="bufferBadge" title="Buffer Duration">Buffer: 2m</span>
      </div>
      <button id="startBtn" class="action-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"></circle>
          <circle cx="12" cy="12" r="3" fill="white"></circle>
        </svg>
        Start Recording
      </button>
    </div>

    <!-- SEPARATOR/SPACER -->
    <!-- <hr style="border:0; border-top:1px solid var(--border); margin:0;"> -->

    <!-- SCREENSHOTS -->
    <div style="display:flex; flex-direction:column; gap:8px;">
      <div class="section-label">Screen Capture</div>
      <div class="screenshot-grid">
        <div class="tool-card" id="shotVisible">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
          <div class="tool-label">Visible View</div>
        </div>
        <div class="tool-card" id="shotRegion">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 2v14a2 2 0 0 0 2 2h14"></path>
            <path d="M18 22V8a2 2 0 0 0-2-2H2"></path>
          </svg>
          <div class="tool-label">Selected Area</div>
        </div>
        <div class="tool-card full-width" id="shotFull">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
            <circle cx="12" cy="13" r="4"></circle>
          </svg>
          <div class="tool-label">Entire Page</div>
        </div>
      </div>
    </div>

    <div id="errorMsg" style="color:var(--danger); font-size:11px; text-align:center;"></div>

  </main>

  <!-- ACTIVE RECORDING OVERLAY -->
  <div id="activeControls" class="hidden recording-overlay">
    <div class="recording-pulse"></div>
    <div
      style="font-size:12px; font-weight:600; color:var(--text-secondary); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px;">
      Recording</div>
    <div class="timer">REC</div>

    <div class="controls-row">
      <button id="pauseBtn" class="action-btn btn-secondary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <rect x="6" y="4" width="4" height="16" />
          <rect x="14" y="4" width="4" height="16" />
        </svg>
        Pause
      </button>
      <button id="stopBtn" class="action-btn btn-danger">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="6" y="6" width="12" height="12" fill="currentColor"></rect>
        </svg>
        Stop
      </button>
    </div>
  </div>

  <!-- SETTINGS OVERLAY -->
  <div id="settingsView" class="settings-view hidden">
    <div class="settings-header">
      <button class="icon-btn" id="closeSettingsBtn" style="margin-right:8px;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
      </button>
      Settings
    </div>
    <div class="settings-body">
      <div class="setting-item">
        <label class="setting-label" style="display:flex; justify-content:space-between; align-items:center;">
          Show Widget
          <label class="switch"><input type="checkbox" id="showWidgetCheckbox"><span class="slider"></span></label>
        </label>
      </div>
      <div class="setting-item">
        <label class="setting-label" style="display:flex; justify-content:space-between; align-items:center;">
          Show Clicks
          <label class="switch"><input type="checkbox" id="showClicksCheckbox"><span class="slider"></span></label>
        </label>
      </div>
      <div class="setting-item">
        <label class="setting-label">Buffer Duration (mins)</label>
        <input type="number" id="bufferDurationInput" min="1" max="10">
      </div>

      <div style="height:1px; background:var(--border); margin:20px 0;"></div>

      <div style="font-size:12px; font-weight:700; color:var(--text-main); margin-bottom:12px;">Jira Integration</div>
      <div class="setting-item">
        <label class="setting-label">Domain</label>
        <input type="text" id="jiraDomainInput" placeholder="company.atlassian.net">
      </div>
      <div class="setting-item">
        <label class="setting-label">Email</label>
        <input type="text" id="jiraEmailInput" placeholder="email@example.com">
      </div>
      <div class="setting-item">
        <label class="setting-label">API Token</label>
        <input type="password" id="jiraTokenInput">
      </div>

      <!-- Hidden fields -->
      <input type="hidden" id="jiraTypeInput" value="server">
      <textarea id="domainsInput" class="hidden"></textarea>
      <input type="hidden" id="clickSizeInput" value="20">

      <button id="saveSettingsBtn" class="action-btn" style="margin-top:10px;">Save Settings</button>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <button class="icon-btn" id="importBtn" title="Open Dashboard">
      <span style="font-size:12px; font-weight:500; margin-right:6px;">Dashboard</span>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"></rect>
        <rect x="14" y="3" width="7" height="7"></rect>
        <rect x="14" y="14" width="7" height="7"></rect>
        <rect x="3" y="14" width="7" height="7"></rect>
      </svg>
    </button>
  </footer>

  <script src="popup.js"></script>
</body>

</html>
